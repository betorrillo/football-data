name: Update Football Database

on:
  # Manual trigger from GitHub app/website
  workflow_dispatch:
    inputs:
      scope:
        description: 'What to update'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - matches
          - stats
          - referees
          - injuries
          - fixtures
          - players

  # Automatic: TWICE DAILY — morning + evening refresh
  # 07:00 UTC (09:00 Spain) = morning update
  # 19:00 UTC (21:00 Spain) = evening refresh before weekend fixtures
  schedule:
    - cron: '0 7,19 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update matches
        if: contains(fromJSON('["all","matches"]'), github.event.inputs.scope || 'all')
        run: |
          echo "--- Updating matches ---"
          timeout 120 python3 scripts/update_all.py --matches

      - name: Update referees
        if: contains(fromJSON('["all","referees"]'), github.event.inputs.scope || 'all')
        run: |
          echo "--- Updating referees ---"
          timeout 420 python3 scripts/scrape_referees.py || echo "⚠️ Referees failed/timeout (non-blocking)"

      - name: Update injuries
        if: contains(fromJSON('["all","injuries"]'), github.event.inputs.scope || 'all')
        run: |
          echo "--- Updating injuries ---"
          timeout 120 python3 scripts/scrape_injuries.py || echo "⚠️ Injuries failed/timeout (non-blocking)"

      - name: Update stats
        if: contains(fromJSON('["all","stats"]'), github.event.inputs.scope || 'all')
        run: |
          echo "--- Updating stats ---"
          timeout 60 python3 scripts/update_all.py --stats || echo "⚠️ Stats failed/timeout (non-blocking)"

      - name: Update fixtures
        if: contains(fromJSON('["all","fixtures"]'), github.event.inputs.scope || 'all')
        run: |
          echo "--- Updating fixtures ---"
          timeout 60 python3 scripts/update_all.py --fixtures || echo "⚠️ Fixtures failed/timeout (non-blocking)"

      - name: Update player stats (FotMob)
        if: contains(fromJSON('["all","players"]'), github.event.inputs.scope || 'all')
        run: |
          echo "--- Updating player stats (FotMob) ---"
          timeout 300 python3 scripts/scrape_player_stats.py || echo "⚠️ Player stats failed/timeout (non-blocking)"

      - name: Update match events (ESPN)
        if: github.event.inputs.scope == 'all' || github.event.inputs.scope == ''
        run: |
          echo "--- Updating match events ---"
          timeout 300 python3 scripts/scrape_match_events.py || echo "⚠️ Match events failed/timeout (non-blocking)"

      - name: Fetch API data (football-data.org)
        if: github.event.inputs.scope == 'all' || github.event.inputs.scope == ''
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          echo "--- Fetching API data ---"
          timeout 240 python3 scripts/fetch_football_data_api.py --all || echo "⚠️ API fetch failed/timeout (non-blocking)"

      - name: Build analysis pack
        run: |
          echo "--- Building analysis pack ---"
          python3 scripts/build_analysis_pack.py

      - name: Build probable lineups
        run: |
          echo "--- Building probable lineups ---"
          python3 scripts/build_probable_lineups.py || echo "⚠️ Lineups failed (non-blocking)"

      - name: Build fixture predictions (with referee analysis)
        run: |
          echo "--- Building fixture predictions ---"
          python3 scripts/build_fixture_predictions.py || echo "⚠️ Fixture predictions failed (non-blocking)"

      - name: Build H2H per-match
        run: |
          echo "--- Building H2H per-match ---"
          python3 scripts/build_h2h.py || echo "⚠️ H2H failed (non-blocking)"

      - name: Split bulk data to per-match files
        run: |
          echo "--- Splitting bulk to per-match ---"
          python3 scripts/split_bulk_to_matches.py || echo "⚠️ Split failed (non-blocking)"

      - name: Build agent bundle
        run: |
          echo "--- Building agent bundle ---"
          python3 scripts/build_agent_bundle.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update database $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      # ─── Google Drive sync ───
      - name: Install Drive dependencies
        if: env.GDRIVE_SERVICE_ACCOUNT_JSON != ''
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: pip install google-api-python-client google-auth

      - name: Upload key files to Google Drive
        if: env.GDRIVE_SERVICE_ACCOUNT_JSON != ''
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: timeout 60 python3 scripts/upload_to_drive.py || echo "⚠️ Drive upload failed (non-blocking)"
