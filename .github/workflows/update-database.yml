name: Update Football Database

on:
  # Manual trigger from GitHub app/website
  workflow_dispatch:
    inputs:
      scope:
        description: 'What to update'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - matches
          - stats
          - referees
          - injuries
          - fixtures

  # Automatic: Tuesday and Friday at 10:00 AM CET
  schedule:
    - cron: '0 8 * * 2'   # Tuesday 10:00 CET (8:00 UTC)
    - cron: '0 8 * * 5'   # Friday 10:00 CET (8:00 UTC)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run update scripts
        run: |
          SCOPE="${{ github.event.inputs.scope || 'all' }}"
          echo "=== Scope: $SCOPE ==="

          if [ "$SCOPE" = "all" ] || [ "$SCOPE" = "matches" ]; then
            echo "--- Updating matches ---"
            python3 scripts/update_all.py --matches
          fi

          if [ "$SCOPE" = "all" ] || [ "$SCOPE" = "referees" ]; then
            echo "--- Updating referees ---"
            python3 scripts/scrape_referees.py
          fi

          if [ "$SCOPE" = "all" ] || [ "$SCOPE" = "injuries" ]; then
            echo "--- Updating injuries ---"
            python3 scripts/scrape_injuries.py
          fi

          if [ "$SCOPE" = "all" ] || [ "$SCOPE" = "stats" ]; then
            echo "--- Updating stats ---"
            python3 scripts/update_all.py --stats
          fi

          if [ "$SCOPE" = "all" ] || [ "$SCOPE" = "fixtures" ]; then
            echo "--- Updating fixtures ---"
            python3 scripts/update_all.py --fixtures
          fi

          # Player stats from FBref (weekly, slow due to rate limits)
          if [ "$SCOPE" = "all" ]; then
            echo "--- Updating player stats ---"
            python3 scripts/scrape_player_stats.py || echo "Player stats failed (non-blocking)"
          fi

          # Match events from ESPN API
          if [ "$SCOPE" = "all" ]; then
            echo "--- Updating match events ---"
            python3 scripts/scrape_match_events.py || echo "Match events failed (non-blocking)"
          fi

          # Always rebuild analysis pack and status
          echo "--- Building analysis pack ---"
          python3 scripts/build_analysis_pack.py

          echo "--- Building probable lineups ---"
          python3 scripts/build_probable_lineups.py

          echo "--- Building agent bundle ---"
          python3 scripts/build_agent_bundle.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update database $(date +%Y-%m-%d)"
            git push
          fi
